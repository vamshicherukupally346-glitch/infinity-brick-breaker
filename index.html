<!DOCTYPE html>
<html>

<head>

<title>🧱 Infinity Brick Breaker</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<!-- HOME MENU -->

<div id="mainMenu">

<h1>🧱 Infinity Brick Breaker</h1>

<button onclick="showGame()">
▶ PLAY
</button>

<br><br>

<button onclick="showLevels()">
🗺 LEVEL MAP
</button>

<br><br>

<button onclick="showSettings()">
⚙ SETTINGS
</button>

<br><br>

<button onclick="toggleFullscreen()">
⛶ FULLSCREEN
</button>

</div>





<!-- GAME AREA -->


<canvas id="game" width="800" height="500"></canvas>


<h3 id="status"></h3>






<!-- LEVEL MAP -->


<div id="levelMap">


<h1>🗺 LEVEL MAP</h1>


<div id="levels"></div>


<br>


<button onclick="backHome()">

HOME

</button>


</div>








<!-- SETTINGS -->


<div id="settings">


<h1>⚙ SETTINGS</h1>



<h3>User Name</h3>

<input id="username" placeholder="Enter Name">





<h3>Ball Color</h3>


<select id="ballColor">

<option value="yellow">
Yellow
</option>


<option value="red">
Red
</option>


<option value="blue">
Blue
</option>


<option value="lime">
Green
</option>


</select>







<h3>Paddle Color</h3>


<select id="paddleColor">


<option value="cyan">
Cyan
</option>


<option value="red">
Red
</option>


<option value="white">
White
</option>


<option value="lime">
Green
</option>


</select>




<br><br>


<label>

<input id="music" type="checkbox">

Background Music

</label>



<br>



<label>

<input id="sounds" type="checkbox">

Sound Effects

</label>



<br><br>



<button onclick="saveSettings()">

SAVE

</button>



<button onclick="backHome()">

BACK

</button>


</div>








<!-- GAME OVER -->


<div id="gameOver">


<h1>
GAME OVER
</h1>


<h2 id="result"></h2>



<button onclick="restartGame()">

PLAY AGAIN

</button>



</div>








<!-- MOBILE CONTROL -->


<div class="mobile">


<button id="left">

⬅

</button>


<button id="right">

➡

</button>


</div>






<script src="game.js"></script>


</body>

</html>
